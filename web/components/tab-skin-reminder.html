<!-- TAB: Skin Reminder -->
  <div class="tab-page active" id="tab-skin-reminder" style="display:block">

  <!-- Stats bar -->
  <div class="stats-bar" id="statsBar"></div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="toolbar-left" id="filterBtns">
      <button class="filter-btn active" data-cat="all">Toate</button>
      <button class="filter-btn" data-cat="skin-arma">Skin Arma</button>
      <button class="filter-btn" data-cat="costum">Costum</button>
      <button class="filter-btn" data-cat="frizura">Frizura</button>
    </div>
    <div class="search-wrap">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-input" id="searchInput" placeholder="Cauta item / cont..." type="text">
    </div>
    <button class="btn-calendar" data-action="open-expiry-cal" title="Calendar expirari">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Calendar
    </button>
    <button class="btn-add" id="btnAdd">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adauga Item
    </button>
  </div>

  <!-- Urgency banner (legacy, hidden — replaced by notification center) -->
  <div class="urgency-banner" id="urgencyBanner" style="display:none!important"></div>

  <!-- 7-day expiry widget (collapsible) -->
  <div class="expiry-widget" id="srSidebar" style="display:none">
    <div class="expiry-widget-header" id="sidebarToggle" title="Click pentru a ascunde/afisa">
      <span class="expiry-widget-title">Expira in 7 zile</span>
      <span class="sidebar-total-badge" id="sidebarTotal">0</span>
      <svg class="sidebar-chevron" id="sidebarChevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="sidebar-body" id="sidebarCats">
      <div class="sidebar-empty">Niciun item</div>
    </div>
  </div>

  <!-- Main grid -->
  <div class="grid" id="grid"></div>

  </div><!-- /tab-skin-reminder -->
