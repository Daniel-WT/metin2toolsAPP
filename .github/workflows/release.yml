name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Prepare signing key
        env:
          RAW_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        shell: pwsh
        run: |
          $key = $env:RAW_KEY -replace "`r`n|`r|`n", ""
          "TAURI_PRIVATE_KEY=$key" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Metin2 Tools ${{ github.ref_name }}'
          releaseBody: |
            ## Ce e nou in aceasta versiune
            Vezi sectiunea Versiuni & Update din aplicatie pentru detalii complete.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
