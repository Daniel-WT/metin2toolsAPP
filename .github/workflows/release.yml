name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Build Tauri app
        shell: pwsh
        working-directory: desktop
        env:
          RAW_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          $raw = $env:RAW_KEY
          if ($raw -match 'untrusted comment') {
            $normalized = $raw -replace "`r`n", "`n" -replace "`r", "`n"
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($normalized)
            $env:TAURI_PRIVATE_KEY = [Convert]::ToBase64String($bytes)
          } else {
            $env:TAURI_PRIVATE_KEY = ($raw -split '\s+' -join '')
          }
          $env:TAURI_KEY_PASSWORD = ""
          Write-Host "Key length: $($env:TAURI_PRIVATE_KEY.Length)"
          npm run tauri build

      - name: Create GitHub Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          $bundleDir = "desktop\src-tauri\target\release\bundle\nsis"

          $setupExe = (Get-ChildItem "$bundleDir\*_x64-setup.exe")[0].FullName
          $nsisZip  = (Get-ChildItem "$bundleDir\*_x64-setup.nsis.zip" | Where-Object { $_.Extension -ne ".sig" })[0].FullName
          $nsisSig  = (Get-ChildItem "$bundleDir\*_x64-setup.nsis.zip.sig")[0].FullName

          Write-Host "Setup: $setupExe"
          Write-Host "Zip:   $nsisZip"
          Write-Host "Sig:   $nsisSig"

          gh release create $tag $setupExe $nsisZip $nsisSig `
            --title "Metin2 Tools $tag" `
            --notes "## Ce e nou in aceasta versiune`nVezi sectiunea Versiuni & Update din aplicatie pentru detalii complete."

          $version  = (Get-Content "desktop\src-tauri\tauri.conf.json" | ConvertFrom-Json).package.version
          $sig      = (Get-Content $nsisSig -Raw).Trim()
          $zipName  = Split-Path $nsisZip -Leaf
          $dlUrl    = "https://github.com/Daniel-WT/metin2toolsAPP/releases/download/$tag/$zipName"
          $pubDate  = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")

          $latestJson = [ordered]@{
            version   = $version
            notes     = "Actualizare disponibila"
            pub_date  = $pubDate
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $sig
                url       = $dlUrl
              }
            }
          } | ConvertTo-Json -Depth 10

          $latestJson | Out-File -FilePath "latest.json" -Encoding ascii -NoNewline
          gh release upload $tag "latest.json"
          Write-Host "Release $tag creat cu succes."
