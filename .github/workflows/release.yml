name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './desktop/src-tauri -> target'

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm install

      - name: Prepare signing key
        shell: pwsh
        env:
          RAW_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        run: |
          $raw = $env:RAW_KEY
          if ($raw -match 'untrusted comment') {
            $normalized = $raw -replace "`r`n", "`n" -replace "`r", "`n"
            $bytes = [System.Text.Encoding]::UTF8.GetBytes($normalized)
            $b64 = [Convert]::ToBase64String($bytes)
          } else {
            $b64 = ($raw -split '\s+' -join '')
          }
          # Use ASCII (no BOM) — PowerShell 5.1 Out-File utf8 adds BOM which breaks GITHUB_ENV parsing
          $ascii = [System.Text.Encoding]::ASCII
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "TAURI_PRIVATE_KEY=$b64`nTAURI_KEY_PASSWORD=`n", $ascii)
          Write-Host "Key ready (length=$($b64.Length))"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ env.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ env.TAURI_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'Metin2 Tools ${{ github.ref_name }}'
          releaseBody: |
            ## Ce e nou in aceasta versiune
            Vezi sectiunea Versiuni & Update din aplicatie pentru detalii complete.
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
